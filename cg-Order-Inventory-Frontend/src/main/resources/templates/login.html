<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Login — Order Inventory</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 40px 36px;
            width: 100%;
            max-width: 400px;
        }
        .logo {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #38bdf8;
            margin-bottom: 8px;
        }
        h1 { font-size: 22px; font-weight: 700; color: #f1f5f9; margin-bottom: 28px; }
        .error-box {
            background: #450a0a;
            border: 1px solid #b91c1c;
            color: #fca5a5;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: #94a3b8;
            margin-bottom: 6px;
            text-transform: uppercase;
        }
        input {
            width: 100%;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #f1f5f9;
            font-size: 14px;
            padding: 10px 14px;
            margin-bottom: 18px;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: #38bdf8; }
        button {
            width: 100%;
            background: #0ea5e9;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            padding: 11px;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 4px;
        }
        button:hover { background: #0284c7; }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">Order Inventory</div>
    <h1>Sign in</h1>
    <div class="error-box" th:if="${error}" th:text="${error}"></div>
    <form th:action="@{/auth/login}" th:object="${loginRequest}" method="post">
        <label>Email</label>
        <input type="email" th:field="*{email}" placeholder="you@example.com" required />
        <label>Password</label>
        <input type="password" th:field="*{password}" placeholder="••••••••" required />
        <button type="submit">Sign in</button>
    </form>
</div>
</body>
</html>
